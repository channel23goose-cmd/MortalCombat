<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortal Kombat: Maximum Realism</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Metal+Mania&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --p1-color: #3b82f6;
            /* Azure */
            --p2-color: #ef4444;
            /* Crimson */
            --bg-dark: #050505;
            --accent: #f59e0b;
            /* Gold */
            --health-bg: rgba(50, 50, 50, 0.8);
            --health-inner-bg: #111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Metal Mania', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            transform-origin: center;
            transition: transform 0.1s;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            border: 4px solid #1a1a1a;
            background: #000;
            overflow: hidden;
        }

        #ui {
            position: absolute;
            top: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            pointer-events: none;
            z-index: 20;
        }

        .player-info {
            width: 42%;
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px #000;
            color: #ddd;
        }

        #p1-name {
            text-align: left;
        }

        #p2-name {
            text-align: right;
        }

        .health-bar-container {
            height: 25px;
            background: var(--health-inner-bg);
            border: 2px solid #555;
            position: relative;
            box-shadow: inset 0 0 10px #000;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(to bottom, #22c55e, #16a34a);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
            transition: width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            width: 100%;
        }

        #p1-health-fill {
            float: right;
        }

        #p2-health-fill {
            float: left;
        }

        #timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #timer {
            font-size: 56px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
            padding: 0 15px;
        }

        #message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 110px;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Cinzel Decorative', cursive;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.4));
            display: none;
            z-index: 100;
            text-align: center;
            letter-spacing: 5px;
        }

        #sub-message {
            font-size: 40px;
            color: var(--p2-color);
            margin-top: 20px;
            letter-spacing: 12px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }

            100% {
                opacity: 0.5;
                transform: scale(1);
            }
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="ui">
                <div class="player-info">
                    <div id="p1-name" class="player-name">SUB-ZERO</div>
                    <div class="health-bar-container">
                        <div id="p1-health-fill" class="health-fill"></div>
                    </div>
                </div>
                <div id="timer-container">
                    <div id="timer">99</div>
                </div>
                <div class="player-info">
                    <div id="p2-name" class="player-name">SCORPION</div>
                    <div class="health-bar-container">
                        <div id="p2-health-fill" class="health-fill"></div>
                    </div>
                </div>
            </div>
            <div id="message">
                <div id="main-text">FINISH HIM!</div>
                <div id="sub-message">FATALITY</div>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('game-wrapper');
        const timerEl = document.getElementById('timer');
        const messageEl = document.getElementById('message');
        const mainText = document.getElementById('main-text');
        const p1HealthFill = document.getElementById('p1-health-fill');
        const p2HealthFill = document.getElementById('p2-health-fill');

        canvas.width = 1152;
        canvas.height = 648;

        const GRAVITY = 0.8;
        const GROUND_Y = canvas.height - 80;
        const COLORS = {
            p1: '#3b82f6',
            p1Deep: '#1d4ed8',
            p2: '#ef4444',
            p2Deep: '#b91c1c',
            blood: '#880000',
            dust: 'rgba(100, 100, 100, 0.4)'
        };

        // --- Game State ---
        let gameActive = true;
        let timeLeft = 99;
        let timerId;
        let shakeAmount = 0;
        let hitStopFrames = 0;
        let scrollX = 0;

        // --- Particle System ---
        class Particle {
            constructor(x, y, color, velocity) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = velocity;
                this.alpha = 1;
                this.size = Math.random() * 4 + 2;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.velocity.y += 0.2; // Small gravity for particles
                this.alpha -= this.decay;
            }
        }
        let particles = [];

        function spawnBlood(x, y, dir) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(
                    x, y,
                    COLORS.blood,
                    { x: (Math.random() - 0.5 + dir) * 8, y: (Math.random() - 0.7) * 10 }
                ));
            }
        }

        // --- Layers (Parallax) ---
        const layers = [
            { color: '#1a0d0d', speed: 0.1, heights: [150, 250, 200, 300] }, // Farthest peaks
            { color: '#2b1a1a', speed: 0.3, heights: [100, 180, 140, 220] }, // Mid peaks
            { color: '#3d2b2b', speed: 0.6, heights: [50, 100, 70, 120] }    // Near ruins
        ];

        function drawBackground() {
            // Sky Gradient
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, '#0a0505');
            skyGrad.addColorStop(1, '#2d1414');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            layers.forEach(layer => {
                ctx.fillStyle = layer.color;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                for (let i = 0; i <= canvas.width; i += 100) {
                    let h = layer.heights[(Math.floor(i / 100) + Math.floor(scrollX * layer.speed / 10)) % layer.heights.length];
                    ctx.lineTo(i, GROUND_Y - h);
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.fill();
            });

            // Ground
            let floorGrad = ctx.createLinearGradient(0, GROUND_Y, 0, canvas.height);
            floorGrad.addColorStop(0, '#222');
            floorGrad.addColorStop(0.2, '#111');
            floorGrad.addColorStop(1, '#000');
            ctx.fillStyle = floorGrad;
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

            // Grid lines for perspective
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 100) {
                ctx.beginPath();
                ctx.moveTo(i - (scrollX % 100), GROUND_Y);
                ctx.lineTo(i - (scrollX % 100) - 200, canvas.height);
                ctx.stroke();
            }
        }

        // --- Input Handling ---
        const keys = {
            a: { pressed: false }, d: { pressed: false }, w: { pressed: false },
            ArrowRight: { pressed: false }, ArrowLeft: { pressed: false }, ArrowUp: { pressed: false }
        };

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (keys[e.key]) keys[e.key].pressed = true;
            if (e.key === 'w') p1.jump();
            if (e.key === ' ') p1.attack();
            if (e.key === 'ArrowUp') p2.jump();
            if (e.key === 'Enter') p2.attack();
        });

        window.addEventListener('keyup', (e) => {
            if (keys[e.key]) keys[e.key].pressed = false;
        });

        // --- Classes ---
        class Player {
            constructor({ position, baseColor, accentColor, facing }) {
                this.position = position;
                this.velocity = { x: 0, y: 0 };
                this.width = 60;
                this.height = 170;
                this.baseColor = baseColor;
                this.accentColor = accentColor;
                this.health = 100;
                this.isAttacking = false;
                this.facing = facing; // 1 for right, -1 for left
                this.animTimer = 0;

                this.attackBox = {
                    width: 140,
                    height: 80,
                    offset: { x: facing === 1 ? 0 : -80, y: 30 }
                };
            }

            draw() {
                this.animTimer += 0.05;
                const sway = Math.sin(this.animTimer) * 5;
                const breath = Math.cos(this.animTimer * 0.5) * 3;

                ctx.save();
                ctx.translate(this.position.x + this.width / 2, this.position.y + this.height);

                // Body parts with gradients
                const drawPart = (x, y, w, h, color, round = 5) => {
                    let grad = ctx.createLinearGradient(x, y, x + w, y);
                    grad.addColorStop(0, color);
                    grad.addColorStop(0.5, this.accentColor);
                    grad.addColorStop(1, color);
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, round);
                    ctx.fill();
                    // Highlights
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.stroke();
                };

                // Legs
                drawPart(-25, -70, 18, 70, '#111');
                drawPart(7, -70, 18, 70, '#111');

                // Torso
                drawPart(-28, -135 + breath, 56, 75, this.baseColor, 10);

                // Head
                ctx.fillStyle = '#ebc49f'; // Skin
                ctx.beginPath();
                ctx.arc(0, -150 + breath * 1.5, 18, 0, Math.PI * 2);
                ctx.fill();
                // Mask
                ctx.fillStyle = this.baseColor;
                ctx.fillRect(-18, -145 + breath * 1.5, 36, 12);

                // Arms
                let armAngle = this.isAttacking ? (this.facing === 1 ? -1 : 1) : Math.sin(this.animTimer) * 0.2;
                ctx.save();
                ctx.translate(this.facing === 1 ? 25 : -25, -125 + breath);
                ctx.rotate(armAngle);
                drawPart(this.facing === 1 ? 0 : -15, 0, 15, 60, this.baseColor);
                ctx.restore();

                ctx.restore();

                // Hitbox Debug (Optional, kept subtle)
                if (this.isAttacking) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.fillRect(
                        this.position.x + this.attackBox.offset.x,
                        this.position.y + this.attackBox.offset.y,
                        this.attackBox.width,
                        this.attackBox.height
                    );
                }
            }

            update() {
                this.draw();

                this.position.x += this.velocity.x;
                this.position.y += this.velocity.y;

                // Physics
                if (this.position.y + this.height + this.velocity.y >= GROUND_Y) {
                    this.velocity.y = 0;
                    this.position.y = GROUND_Y - this.height;
                } else {
                    this.velocity.y += GRAVITY;
                }

                // Boundaries
                if (this.position.x < 0) this.position.x = 0;
                if (this.position.x + this.width > canvas.width) this.position.x = canvas.width - this.width;

                // Update facing
                const other = this === p1 ? p2 : p1;
                this.facing = this.position.x < other.position.x ? 1 : -1;
                this.attackBox.offset.x = this.facing === 1 ? 20 : -100;
            }

            jump() {
                if (this.position.y + this.height >= GROUND_Y) {
                    this.velocity.y = -22;
                }
            }

            attack() {
                if (this.isAttacking) return;
                this.isAttacking = true;
                setTimeout(() => this.isAttacking = false, 150);
            }
        }

        const p1 = new Player({
            position: { x: 200, y: 0 },
            baseColor: COLORS.p1,
            accentColor: COLORS.p1Deep,
            facing: 1
        });
        const p2 = new Player({
            position: { x: 800, y: 0 },
            baseColor: COLORS.p2,
            accentColor: COLORS.p2Deep,
            facing: -1
        });

        // --- Utilities ---
        function checkCollision(r1, r2) {
            return (
                r1.position.x + r1.attackBox.offset.x + r1.attackBox.width >= r2.position.x &&
                r1.position.x + r1.attackBox.offset.x <= r2.position.x + r2.width &&
                r1.position.y + r1.attackBox.offset.y + r1.attackBox.height >= r2.position.y &&
                r1.position.y + r1.attackBox.offset.y <= r2.position.y + r2.height
            );
        }

        function triggerHit(attacker, victim) {
            attacker.isAttacking = false;
            victim.health -= 8;
            shakeAmount = 10;
            hitStopFrames = 5;
            spawnBlood(
                victim.position.x + victim.width / 2,
                victim.position.y + victim.height / 2,
                attacker.facing
            );

            // UI Update
            const fill = victim === p1 ? p1HealthFill : p2HealthFill;
            fill.style.width = victim.health + '%';
            if (victim.health < 20) fill.style.background = 'linear-gradient(to bottom, #ef4444, #b91c1c)';
        }

        function endMatch() {
            gameActive = false;
            messageEl.style.display = 'block';
            if (p1.health <= 0 || p2.health <= 0) {
                mainText.innerText = 'FINISH HIM!';
                setTimeout(() => {
                    mainText.innerText = p1.health > p2.health ? 'SUB-ZERO WINS' : 'SCORPION WINS';
                    document.getElementById('sub-message').style.display = 'block';
                }, 2000);
            } else {
                mainText.innerText = 'TIME OVER';
            }
        }

        function decreaseTimer() {
            if (gameActive && timeLeft > 0) {
                timerId = setTimeout(decreaseTimer, 1000);
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft < 10) timerEl.style.color = '#ff0000';
            }
            if (timeLeft === 0) endMatch();
        }

        // --- Game Loop ---
        function animate() {
            window.requestAnimationFrame(animate);

            if (hitStopFrames > 0) {
                hitStopFrames--;
                return;
            }

            drawBackground();

            // Screen Shake
            if (shakeAmount > 0) {
                const sx = (Math.random() - 0.5) * shakeAmount;
                const sy = (Math.random() - 0.5) * shakeAmount;
                wrapper.style.transform = `translate(${sx}px, ${sy}px)`;
                shakeAmount *= 0.9;
            } else {
                wrapper.style.transform = `translate(0,0)`;
            }

            // Move Scroll (Parallax feel)
            const centerX = (p1.position.x + p2.position.x) / 2;
            scrollX += (centerX - canvas.width / 2 - scrollX) * 0.05;

            // Update Particles
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => { p.update(); p.draw(); });

            // Player logic
            p1.velocity.x = 0;
            if (keys.a.pressed) p1.velocity.x = -7;
            if (keys.d.pressed) p1.velocity.x = 7;

            p2.velocity.x = 0;
            if (keys.ArrowLeft.pressed) p2.velocity.x = -7;
            if (keys.ArrowRight.pressed) p2.velocity.x = 7;

            // Body collision
            if (Math.abs(p1.position.x - p2.position.x) < 50) {
                if (p1.position.x < p2.position.x) {
                    p1.position.x -= 2;
                    p2.position.x += 2;
                } else {
                    p1.position.x += 2;
                    p2.position.x -= 2;
                }
            }

            p1.update();
            p2.update();

            // Combat detection
            if (p1.isAttacking && checkCollision(p1, p2)) triggerHit(p1, p2);
            if (p2.isAttacking && checkCollision(p2, p1)) triggerHit(p2, p1);

            if (gameActive && (p1.health <= 0 || p2.health <= 0)) endMatch();
        }

        decreaseTimer();
        animate();

    </script>
</body>

</html>
