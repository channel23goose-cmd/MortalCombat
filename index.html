<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortal Kombat JS | Browser Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;600;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- Character Selection Screen -->
        <div id="selection-screen">
            <h2 id="selection-title">SELECT YOUR FIGHTER</h2>
            <div id="character-grid">
                <div class="char-slot" data-char="scorpion">
                    <div class="char-portrait" style="background-color: var(--p1-color);"></div>
                    <div class="char-name">SCORPION</div>
                </div>
                <div class="char-slot" data-char="subzero">
                    <div class="char-portrait" style="background-color: var(--p2-color);"></div>
                    <div class="char-name">SUB-ZERO</div>
                </div>
                <div class="char-slot" data-char="reptile">
                    <div class="char-portrait" style="background-color: #22dd22;"></div>
                    <div class="char-name">REPTILE</div>
                </div>
            </div>
            <div id="selection-info">
                <div class="p1-choice">P1: <span id="p1-selected">NONE</span></div>
                <div class="p2-choice">P2: <span id="p2-selected">NONE</span></div>
            </div>
            <div id="start-hint">PRESS SPACE TO FIGHT</div>
        </div>

        <!-- HUD Overlay -->
        <div id="hud">
            <div class="player-stats p1">
                <div class="name">SCORPION</div>
                <div class="health-bar-container">
                    <div class="health-bar-bg"></div>
                    <div class="health-bar-damage"></div>
                    <div id="p1-health" class="health-bar-inner"></div>
                </div>
            </div>

            <div id="timer-container">
                <div id="timer">99</div>
            </div>

            <div class="player-stats p2">
                <div class="name">SUB-ZERO</div>
                <div class="health-bar-container">
                    <div class="health-bar-bg"></div>
                    <div class="health-bar-damage"></div>
                    <div id="p2-health" class="health-bar-inner"></div>
                </div>
            </div>
        </div>

        <div id="game-messages">
            <h1 id="announcement"></h1>
        </div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Scripts -->
    <script src="game.js" type="module"></script>
</body>

</html>
